[project]
name = "gheim"
version = "0.1.6"
description = "PII round-trip for LLM APIs: anonymize before the request, de-anonymize the stream on the way back."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Joel Barmettler", email = "joel.barmettler@gmail.com" }]
keywords = ["pii", "privacy", "redaction", "openai", "llm", "anonymization", "ner", "swiss"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
local = [
    "torch>=2.2",
    "transformers>=4.45",
]
openai = [
    "openai>=1.50",
]
normalizers = [
    "phonenumbers>=8",
    "dateparser>=1.2",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "openai>=1.50",
    "phonenumbers>=8",
    "dateparser>=1.2",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://github.com/joelbarmettlerUZH/gheim"
Repository = "https://github.com/joelbarmettlerUZH/gheim"
Issues = "https://github.com/joelbarmettlerUZH/gheim/issues"
"Model card" = "https://huggingface.co/joelbarmettler/gheim-ch-560m"
"Dataset card" = "https://huggingface.co/datasets/joelbarmettler/gheim-ch-pii-171k"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gheim"]

[tool.hatch.build.targets.sdist]
include = [
    "src/gheim",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
