# P12 wandb sweep — privacy-filter (1.4B MoE) — v2 bake-off Stage 1.
#
# Grid: 5 LR × 3 LLRD = 15 runs. Each run capped at 500 optimizer steps
# (~25 min on 2× RTX 4090 DDP). All runs train on data/built_v2
# (gheim-pii train + AI4P aug, 156k chunks) and eval on validation.
#
# LR is the single most-impactful knob for fine-tuning. Layer-wise LR decay
# (LLRD) is the second axis — for large pretrained encoders, decaying the
# LR for lower layers (closer to embeddings) preserves general features
# while letting the head adapt. 0.95 = mild decay, 0.9 = aggressive,
# 1.0 = no decay (default optimizer).
#
# Total wall time: ~15 × 25min = ~6.25h.
#
# Launch:
#   wandb sweep training/configs/sweep_v2_priv.yaml
#   # → prints sweep id, e.g. university-of-zurich/gheim-1/abc123
#   wandb agent university-of-zurich/gheim-1/abc123

program: training/src/gheim_training/scripts/sweep_v2_runner.py
method: grid
project: gheim-1
entity: university-of-zurich
metric:
  name: eval/overall_f1
  goal: maximize
parameters:
  model:
    value: priv
  learning_rate:
    values: [5e-6, 1e-5, 2e-5, 3e-5, 5e-5]
  llrd:
    values: [1.0, 0.95, 0.9]
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
