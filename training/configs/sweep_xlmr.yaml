# wandb sweep for the xlmr leader hyperparameter sweep (Day 10-12).
#
# 6 specific runs, varying ONE axis from the baseline at a time:
#   baseline  — re-run of bakeoff_xlmr (sanity check, ~94min)
#   lr5e6     — LR 5e-6 (was 2e-5)
#   lr5e5     — LR 5e-5
#   batch256  — gradient_accumulation_steps=2 (effective batch 256, was 128)
#   epoch5    — num_train_epochs=5 (was 3)
#   freeze    — freeze_embeddings=true (head + body fine-tune only)
#
# Total wall time: ~6 × 90min = ~9h on 2× RTX 4090.
#
# Launch:
#   wandb sweep training/configs/sweep_xlmr.yaml
#   # → prints sweep id, e.g. university-of-zurich/gheim-1/abc123
#   wandb agent university-of-zurich/gheim-1/abc123
#
# Each agent run executes sweep_xlmr_runner.py which translates the
# variant name into the right --override args for train.py.

program: training/src/gheim_training/scripts/sweep_xlmr_runner.py
method: grid
project: gheim-1
entity: university-of-zurich
metric:
  name: eval/overall_f1
  goal: maximize
parameters:
  variant:
    values:
      - baseline
      - lr5e6
      - lr5e5
      - batch256
      - epoch5
      - freeze
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
