base_model: FacebookAI/xlm-roberta-large
output_dir: ./checkpoints/gheim2-xlmr
hub_model_id: joelbarmettler/gheim-2-xlmr-bakeoff

# gheim-2 gold core: Layer 1 (Faker_CH) + Layer 2.v2 (openpii-1m de/fr/it,
# v3 REMAP) + Layer 4.v2 (openpii-1m en, multi-region). Built by:
#   uv run python -m gheim_training.data.build \
#       --in data/layer1.jsonl data/layer2_v2.jsonl data/layer4_v2.jsonl \
#       --out-dir data/built_gheim2 \
#       --waive [the 18 known-gap cells]
#
# Dropped from gheim-1 mix:
#   - Layer 3 (Apertus slot-fill) — small synthetic from weaker model
#   - Layer 5/6 (Apertus on real CH text) — labeler R=0.07
#   - Layer 7 (hand-labeled hard) — ablation showed ±noise
#   - Layer 8 (Gemma+Qwen consensus) — builder code missing, 58%-date skew
dataset_dir: ./data/built_gheim2

eval_split: validation
max_seq_length: 512

learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 3
per_device_train_batch_size: 64
per_device_eval_batch_size: 64
gradient_accumulation_steps: 1
gradient_checkpointing: true
bf16: true

logging_steps: 25
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 4
load_best_model_at_end: true
metric_for_best_model: eval_overall_f1
greater_is_better: true

early_stopping_patience: 4
early_stopping_threshold: 0.001

seed: 17
report_to: ["wandb"]
wandb_project: gheim-2
wandb_entity: university-of-zurich
wandb_run_name: gheim2-xlmr
