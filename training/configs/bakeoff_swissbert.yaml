base_model: ZurichNLP/swissbert
output_dir: ./checkpoints/bakeoff-swissbert
hub_model_id: joelbarmettler/gheim-1-swissbert-bakeoff

# Same dataset as bakeoff_priv.yaml — only base_model differs (Phase 3 design).
# ZurichNLP/swissbert is 270M dense, Switzerland-tuned XMOD with adapter
# weights for de_CH/fr_CH/it_CH/rm_CH; the 33-class classifier head is
# randomly initialised here. (The original CLAUDE.md plan said
# "swissbert-large" but that repo doesn't exist — `swissbert` is the
# public 270M model.)
#
# XMOD requires a language adapter selected before forward. HF Trainer
# feeds mixed-language batches without telling the model which adapter
# to use, so we pin a single default for the whole run. de_CH chosen
# because it's the largest single-language slice in our training mix
# (~30% of train). Other-language adapters remain frozen at their
# pretrained values — this is a known limitation of running an XMOD
# model through a non-XMOD-aware Trainer. Documented for the bake-off.
xmod_default_language: de_CH
dataset_dir: ./data/built_bakeoff

eval_split: validation
max_seq_length: 512

learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 3
per_device_train_batch_size: 64
per_device_eval_batch_size: 64
gradient_accumulation_steps: 1
gradient_checkpointing: true
bf16: true

logging_steps: 25
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 4
load_best_model_at_end: true
metric_for_best_model: eval_overall_f1
greater_is_better: true

early_stopping_patience: 4
early_stopping_threshold: 0.001

seed: 17
report_to: ["wandb"]
wandb_project: gheim-1
wandb_entity: university-of-zurich
wandb_run_name: bakeoff-swissbert
