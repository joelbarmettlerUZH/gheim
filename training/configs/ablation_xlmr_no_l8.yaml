base_model: FacebookAI/xlm-roberta-large
output_dir: ./checkpoints/ablation_xlmr_no_l8
hub_model_id: joelbarmettler/gheim-1-xlmr-ablation-no-l8

# Day 13 ablation: same as bakeoff_xlmr.yaml, but trained on Layers
# 1-8 *minus Layer 8* (the 180k Gemma+Qwen consensus). Tells us
# whether the LLM-ensemble investment moved the needle. This is the
# bigger ablation by far — Layer 8 is 41% of the training mix.
dataset_dir: ./data/built_bakeoff_no_l8

eval_split: validation
max_seq_length: 512

learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 3
per_device_train_batch_size: 64
per_device_eval_batch_size: 64
gradient_accumulation_steps: 1
gradient_checkpointing: true
bf16: true

logging_steps: 25
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 4
load_best_model_at_end: true
metric_for_best_model: eval_overall_f1
greater_is_better: true

early_stopping_patience: 4
early_stopping_threshold: 0.001

seed: 17
report_to: ["wandb"]
wandb_project: gheim-1
wandb_entity: university-of-zurich
wandb_run_name: ablation-xlmr-no-l8
