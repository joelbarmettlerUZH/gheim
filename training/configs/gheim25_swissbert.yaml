base_model: ZurichNLP/swissbert
output_dir: ./checkpoints/gheim25-swissbert
hub_model_id: joelbarmettler/gheim-2-5-swissbert-bakeoff

# gheim-2.5 (see gheim25_xlmr.yaml header for what's included)
dataset_dir: ./data/built_gheim25

# XMOD requires a language adapter pinned for the whole training run.
# de_CH chosen because de_CH is the largest single-language slice
# (113k after Layer 5.v3 adds 13k).
xmod_default_language: de_CH

eval_split: validation
max_seq_length: 512

learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 3

# fp32 to avoid the bf16/fp32 dtype mismatch in XMOD's lang_adapter
# scatter (same workaround as gheim-1 + gheim-2).
per_device_train_batch_size: 32
per_device_eval_batch_size: 32
gradient_accumulation_steps: 2  # effective batch = 64
gradient_checkpointing: true
bf16: false

logging_steps: 25
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 4
load_best_model_at_end: true
metric_for_best_model: eval_overall_f1
greater_is_better: true

early_stopping_patience: 4
early_stopping_threshold: 0.001

seed: 17
report_to: ["wandb"]
wandb_project: gheim-2-5
wandb_entity: university-of-zurich
wandb_run_name: gheim25-swissbert
