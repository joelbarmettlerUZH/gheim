base_model: FacebookAI/xlm-roberta-large
output_dir: ./checkpoints/gheim25-xlmr
hub_model_id: joelbarmettler/gheim-2-5-xlmr-bakeoff

# gheim-2.5 = gheim-2 gold core + Layer 5.v3 (Gemma 4 26B-A4B-labeled
# real Swiss text from apertus-pretrain-swiss). Adds 27k person/date
# spans in genuine Swiss legal+parliamentary register + 35k negative-
# control chunks to suppress the FP-rate explosion gheim-2 had on
# test_v1 real prose (473 address FPs vs 5 gold spans).
#
# Built by:
#   uv run python -m gheim_training.data.build \
#     --in data/layer{1,2_v2,4_v2,5v3_train}.jsonl \
#     --out-dir data/built_gheim25 \
#     --waive [18 cells] --waive rm/private_date
dataset_dir: ./data/built_gheim25

eval_split: validation
max_seq_length: 512

learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 3
per_device_train_batch_size: 64
per_device_eval_batch_size: 64
gradient_accumulation_steps: 1
gradient_checkpointing: true
bf16: true

logging_steps: 25
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 4
load_best_model_at_end: true
metric_for_best_model: eval_overall_f1
greater_is_better: true

early_stopping_patience: 4
early_stopping_threshold: 0.001

seed: 17
report_to: ["wandb"]
wandb_project: gheim-2-5
wandb_entity: university-of-zurich
wandb_run_name: gheim25-xlmr
