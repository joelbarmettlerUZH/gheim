# P12 wandb sweep — swissbert-large (270M) — v2 bake-off Stage 1.
#
# Grid: 5 LR × 3 LLRD = 15 runs. Each run capped at 500 optimizer steps
# (~6 min on 2× RTX 4090 DDP).
#
# Total wall time: ~15 × 6min = ~1.5h.

program: training/src/gheim_training/scripts/sweep_v2_runner.py
method: grid
project: gheim-1
entity: university-of-zurich
metric:
  name: eval/overall_f1
  goal: maximize
parameters:
  model:
    value: swissbert
  learning_rate:
    values: [5e-6, 1e-5, 2e-5, 3e-5, 5e-5]
  llrd:
    values: [1.0, 0.95, 0.9]
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
