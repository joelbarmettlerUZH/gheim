base_model: openai/privacy-filter
output_dir: ./checkpoints/gheim2-priv
hub_model_id: joelbarmettler/gheim-2-priv-bakeoff

# gheim-2 gold core (see gheim2_xlmr.yaml header for what's included/dropped).
dataset_dir: ./data/built_gheim2

eval_split: validation
max_seq_length: 512

learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 3
per_device_train_batch_size: 32
per_device_eval_batch_size: 32
gradient_accumulation_steps: 2  # effective batch = 64 × 2 GPUs / 2 = 64
gradient_checkpointing: true
bf16: true

logging_steps: 25
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 4
load_best_model_at_end: true
metric_for_best_model: eval_overall_f1
greater_is_better: true

early_stopping_patience: 4
early_stopping_threshold: 0.001

seed: 17
report_to: ["wandb"]
wandb_project: gheim-2
wandb_entity: university-of-zurich
wandb_run_name: gheim2-priv
