name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "packages/gheim-js/**"
      - "paper/paper.pdf"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

# Single concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/configure-pages@v6
        with:
          # Auto-enable Pages on first run instead of requiring a manual
          # one-click toggle in the repo settings UI.
          enablement: true

      # Install from the workspace root so the site's `gheim:
      # workspace:*` dep links to the local `packages/gheim-js`.
      # Avoids the chicken-and-egg of requiring a published gheim
      # version on npm before the site can deploy.
      - run: bun install --frozen-lockfile

      # The site imports `gheim` via `workspace:*`. bun symlinks the
      # package source into `node_modules/gheim`, but `package.json`'s
      # `exports` map points at `dist/` — which doesn't exist on a fresh
      # checkout. Build the SDK first so the site's vue-tsc + vite see
      # real files.
      - name: Build SDK (so site can resolve `gheim`)
        run: bun run build
        working-directory: packages/gheim-js

      - run: bun run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
