name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─────────────────────────── tests (gate every publish) ───────────────────────────
  # Every publish job depends on `tests` succeeding. We don't want a green
  # release pipeline alongside a broken model / SDK.
  tests:
    name: Run all tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'
      - name: Cache HuggingFace model downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          # Pin the cache key to the model's current revision on the hub so
          # we redownload only when the model is republished. Falls back to
          # any prior gheim-ch-560m cache if no exact match.
          key: hf-${{ runner.os }}-gheim-ch-560m-${{ hashFiles('packages/gheim-py/tests/test_live_local.py') }}
          restore-keys: |
            hf-${{ runner.os }}-gheim-ch-560m-
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Python tests (SDK + server)
        # Training-package tests need external data (Geonames CH dump,
        # AI4Privacy etc.) that we don't ship in CI — they're dev-only.
        # The release gate covers what we actually publish: gheim and
        # gheim-server.
        run: uv run pytest packages/gheim-py/tests server/tests
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Install from the workspace root (so the site can resolve
      # `gheim: workspace:*`), then run the SDK's scripts in the
      # package directory.
      - run: bun install --frozen-lockfile
      - name: JS lint + test + build
        working-directory: packages/gheim-js
        run: |
          bun run lint
          bun test
          bun run build

  # ─────────────────────────── gheim (PyPI) ───────────────────────────
  detect-py:
    name: Detect gheim (py) version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is-new: ${{ steps.v.outputs.is-new }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Read version + check tag
        run: |
          version=$(grep -E '^version = ' packages/gheim-py/pyproject.toml | cut -d'"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/py-v$version" | grep -q .; then
            echo "is-new=false" >> $GITHUB_OUTPUT
            echo "tag py-v$version exists — skipping"
          else
            echo "is-new=true" >> $GITHUB_OUTPUT
            echo "tag py-v$version is new — will release"
          fi

  pypi:
    name: Publish gheim to PyPI
    needs: [tests, detect-py]
    if: needs.detect-py.outputs.is-new == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gheim
    permissions:
      id-token: write   # PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        # `uv build` from inside a workspace member writes artifacts to the
        # workspace-root /dist by default; force a per-package output dir
        # so pypa/gh-action-pypi-publish finds them.
        run: uv build --package gheim --no-sources --out-dir packages/gheim-py/dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/gheim-py/dist
          skip-existing: true

  release-py:
    name: Tag + release (py)
    needs: [detect-py, pypi]
    if: needs.detect-py.outputs.is-new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "py-v${{ needs.detect-py.outputs.version }}" \
            --title "gheim py v${{ needs.detect-py.outputs.version }}" \
            --generate-notes \
            --target ${{ github.sha }}

  # ─────────────────────────── gheim (npm) ───────────────────────────
  detect-js:
    name: Detect gheim (js) version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is-new: ${{ steps.v.outputs.is-new }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          version=$(node -p "require('./packages/gheim-js/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/js-v$version" | grep -q .; then
            echo "is-new=false" >> $GITHUB_OUTPUT
            echo "tag js-v$version exists — skipping"
          else
            echo "is-new=true" >> $GITHUB_OUTPUT
            echo "tag js-v$version is new — will release"
          fi

  npm:
    name: Publish gheim to npm
    needs: [tests, detect-js]
    if: needs.detect-js.outputs.is-new == 'true'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/gheim
    permissions:
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires npm >=11.5; ship a Node version
          # that bundles a recent enough npm by default.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm if older than 11.5
        run: |
          current=$(npm --version)
          echo "npm $current"
          if [ "$(printf '%s\n' "11.5.0" "$current" | sort -V | head -n1)" != "11.5.0" ]; then
            echo "upgrading npm to >=11.5 for trusted publishing"
            npm install -g npm@latest
            npm --version
          fi
      # Install from the workspace root so the local SDK is built
      # against the same dep graph the tests gate ran on.
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/gheim-js
      # No NODE_AUTH_TOKEN: trusted publishing uses the OIDC token GitHub
      # mints for the `npm` environment (configured at npmjs.com → package
      # → Trusted Publishers).
      - run: npm publish --provenance --access public
        working-directory: packages/gheim-js

  release-js:
    name: Tag + release (js)
    needs: [detect-js, npm]
    if: needs.detect-js.outputs.is-new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "js-v${{ needs.detect-js.outputs.version }}" \
            --title "gheim js v${{ needs.detect-js.outputs.version }}" \
            --generate-notes \
            --target ${{ github.sha }}

  # ─────────────────────────── gheim-server (ghcr) ───────────────────────────
  detect-server:
    name: Detect gheim-server version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is-new: ${{ steps.v.outputs.is-new }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          version=$(grep -E '^version = ' server/pyproject.toml | cut -d'"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/server-v$version" | grep -q .; then
            echo "is-new=false" >> $GITHUB_OUTPUT
          else
            echo "is-new=true" >> $GITHUB_OUTPUT
          fi

  ghcr:
    name: Build + push gheim-server to ghcr
    needs: [tests, detect-server]
    if: needs.detect-server.outputs.is-new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gheim-server
          tags: |
            type=raw,value=${{ needs.detect-server.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-server:
    name: Tag + release (server)
    needs: [detect-server, ghcr]
    if: needs.detect-server.outputs.is-new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "server-v${{ needs.detect-server.outputs.version }}" \
            --title "gheim-server v${{ needs.detect-server.outputs.version }}" \
            --generate-notes \
            --target ${{ github.sha }}
