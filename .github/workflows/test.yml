name: test

# PR gate only. Pushes to main go through release.yml, which runs the
# same test suite as a publish gate — running both on push duplicates
# work and produces misleading red Xs on commits whose publish actually
# went green.
on:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Run tests (SDK + server)
        # Skip training/tests; they need the Geonames CH dump and other
        # external data files that are dev-only.
        run: uv run pytest packages/gheim-py/tests server/tests

  js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gheim-js
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Type-check
        run: bun run lint
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
